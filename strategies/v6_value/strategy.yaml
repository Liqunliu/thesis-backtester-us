meta:
  name: V6 价值投资分析
  version: "6.0"

screening:
  exclude:
  - field: name
    contains: [ST, 退]
  filters:
  - field: pe_ttm
    min: 0.01
    max: 15.0
  - field: pb
    min: 0.01
  - field: total_mv
    min: 1000000.0
  - field: dv
    min: 0.01
  scoring:
    factors:
    - field: pe_ttm
      weight: 0.3
      lower_better: true
      full: 6.0
      zero: 15.0
    - field: pb
      weight: 0.3
      lower_better: true
      full: 0.5
      zero: 1.5
    - field: dv
      weight: 0.4
      lower_better: false
      full: 8.0
      zero: 2.0
    tiers:
    - name: 金龟
      conditions:
      - {field: pe_ttm, max: 8.0}
      - {field: pb, max: 0.8}
      - {field: dv, min: 7.0}
    - name: 银龟
      conditions:
      - {field: pe_ttm, max: 10.0}
      - {field: pb, max: 1.0}
      - {field: dv, min: 5.0}
    - name: 铜龟
      conditions:
      - {field: pe_ttm, max: 12.0}
      - {field: pb, max: 1.2}
      - {field: dv, min: 4.0}
    default_tier: 不达标

framework:
  analyst_role: 严谨的价值投资分析师
  chapters:
  - id: ch01_screening
    chapter: 1
    title: 数据核查与快速筛选
    operators: [data_source_grading, geopolitical_exclusion, quick_screen_5min]
    dependencies: []
  - id: ch02_fundamental
    chapter: 2
    title: 基本面分析
    operators: [soe_identification, stream_classification, debt_structure, cycle_analysis, management_integrity]
    dependencies: [ch01_screening]
  - id: ch03_cashflow
    chapter: 3
    title: 现金流与盈利质量
    operators: [cash_trend_5y, performance_restoration, owner_earnings]
    dependencies: [ch01_screening, ch02_fundamental]
  - id: ch04_valuation
    chapter: 4
    title: 估值与安全边际
    operators: [pe_trap_detection, valuation_fcf, valuation_dividend, safety_margin]
    dependencies: [ch02_fundamental, ch03_cashflow]
  - id: ch05_stress
    chapter: 5
    title: 压力测试与特殊分析
    operators: [stress_test, cigar_butt, light_asset_model]
    dependencies: [ch03_cashflow, ch04_valuation]
  - id: ch06_decision
    chapter: 6
    title: 投资决策与持仓管理
    operators: [apple_trading_model, valuation_repair, position_management]
    dependencies: [ch04_valuation, ch05_stress]
  synthesis_fields:
  - '流派判定: 纯硬收息 / 价值发现 / 烟蒂股 / 关联方资源'
  - '龟级评定: 金龟 / 银龟 / 铜龟 / 不达标'
  - '核心估值指标: EV/FCF倍数、安全边际'
  - '苹果买卖模型: 正常价 / 买入价 / 卖出价'
  - '一句话买入逻辑（强制）: 可证伪的投资命题'
  - '关键风险: Top 3-5 风险点'
  - '管理人诚信评估: 可信 / 存疑 / 不可信'
  - '最终建议: 买入 / 观望 / 回避'
  - '综合评分: 0-100分'
  - '信心水平: 高 / 中 / 低'

backtest:
  cross_section_interval: 6m
  forward_periods:
  - {months: 1, label: 1个月}
  - {months: 3, label: 3个月}
  - {months: 6, label: 6个月}
  - {months: 12, label: 12个月}

llm:
  base_url_env: LLM_BASE_URL
  api_key_env: LLM_API_KEY
  base_url: https://api.openai.com/v1
  model: gpt-4o
  max_tokens: 8192
  temperature: 0.1
