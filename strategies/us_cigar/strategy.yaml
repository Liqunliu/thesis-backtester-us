meta:
  name: US Cigar Butt Deep Value
  version: "1.0"
  description: >
    3-pillar NAV-based deep value framework for US equities. Buys stocks trading
    below net asset value with a clear realization catalyst. T0/T1/T2 tiered NAV
    calculation with 6-point fact check and gradient position sizing.
    Bloomberg preferred, yfinance fallback.
  market: US
  provider: bloomberg  # bloomberg | yfinance

paths:
  operators_dir: operators/us_cigar
  factors_dir: factors/us

# --- Screening ---
screening:
  exclude:
    - field: industry
      contains:
        - Banks - Regional
        - Banks - Diversified
        - Banks - Global
        - Asset Management
        - Capital Markets
        - Insurance - Life
        - Insurance - Diversified
        - Mortgage Finance
        - Credit Services
        - REIT - Mortgage
  filters:
    - field: market_cap
      min: 300              # $300M minimum (millions USD)
    - field: pb
      min: 0.01
      max: 0.60             # P/B < 0.60 — deep value screen
  scoring:
    factors:
      - field: pb
        weight: 0.50
        lower_better: true
        full: 0.30
        zero: 0.60
      - field: market_cap
        weight: 0.25
        lower_better: false
        full: 5000.0
        zero: 300.0
      - field: pe_ttm
        weight: 0.25
        lower_better: true
        full: 5.0
        zero: 20.0
    tiers:
      - name: Deep Value
        conditions:
          - {field: pb, max: 0.50}
      - name: Value
        conditions:
          - {field: pb, max: 0.60}

# --- Chapter DAG ---
# DAG topology:
#   Batch 1: ch01 (quick screen)
#   Batch 2: ch02 (pillar 1 — NAV)
#   Batch 3: ch03 || ch04  (pillar 2 + pillar 3 in parallel)
#   Batch 4: ch05 (fact check)
#   Batch 5: ch06 (valuation synthesis)
framework:
  chapters:
    ch01:
      name: Cigar Butt Quick Screen
      depends: []
      operators:
        - cigar_quick_screen

    ch02:
      name: "Pillar 1 — Net Asset Cushion"
      depends: [ch01]
      snapshot_mode: financial
      operators:
        - pillar1_net_asset_cushion

    ch03:
      name: "Pillar 2 — Operating Maintenance"
      depends: [ch02]
      snapshot_mode: financial
      operators:
        - pillar2_operating_maintenance

    ch04:
      name: "Pillar 3 — Realization Logic"
      depends: [ch02]
      operators:
        - pillar3_realization_logic

    ch05:
      name: Cigar Butt Fact Check
      depends: [ch02, ch03, ch04]
      snapshot_mode: financial
      operators:
        - cigar_fact_check

    ch06:
      name: Cigar Butt Valuation & Synthesis
      depends: [ch05]
      operators:
        - cigar_valuation_synthesis

# --- Synthesis ---
synthesis:
  thinking_steps:
    - step: Veto Gate Check
      instruction: |
        Check all veto gates in sequence:
        1. Quick screen: cigar_pass must be true (eligible_tier != "none")
        2. Pillar 1: At least one tier (T0/T1/T2) must qualify
        3. Pillar 2: Must pass 2/3 operating conditions (ABR + FCF + OCF)
        4. Fact check: fact_check_pass must be true (no veto items triggered)
        If ANY veto triggers -> set total_score <= 20, recommendation = AVOID.

    - step: NAV Tier Classification
      instruction: |
        Determine the best qualifying NAV tier from Pillar 1:
        - T0 (ultra-conservative): Cash - Total Liabilities > 0, price < T0_NAV * 0.85
        - T1 (conservative): Cash - IBD > 0, price < T1_NAV * 0.80
        - T2 (moderate): Adjusted Current Assets - Total Liabilities > 0, price < T2_NAV * 0.70
        Higher tiers = higher asset quality = smaller discount required.

    - step: Realization Assessment
      instruction: |
        From Pillar 3, identify the realization mechanism:
        - Type A: High-dividend below-book (yield >= 5%, P/B <= 0.50, 5+ div years)
        - Type B: Holding company discount (>= 30% SOTP discount)
        - Type C1: Event-driven (asset disposal, buybacks, liquidation)
        - Type C2: Regulatory catalyst (C2 score >= 6)
        No mechanism = value trap risk. Penalize score accordingly.

    - step: Composite Scoring
      instruction: |
        Score each pillar (0-25 each, total 0-100):
        Pillar 1 (0-25): T0=25, T1=20, T2=15, NONE=0
        Pillar 2 (0-25): 3/3 conditions=25, 2/3=15, 1/3=5, 0/3=0
        Pillar 3 (0-25): Strong catalyst A/B=25, C1=20, C2=15, Weak=5, None=0
        Fact Check (0-25): Rating A=25, B+=22, B=18, C=10, D=0
        Total = P1 + P2 + P3 + FC

    - step: Final Recommendation
      instruction: |
        Apply NAV-based decision thresholds.
        Position sizing is by tier: T0 max 10%, T1 max 8%, T2 max 5%.
        Use gradient entry (3 tranches: 40%/30%/30%).
        State recommendation, entry price, exit targets, and stop-loss.

  scoring:
    anchors:
      - range: "85-100"
        profile: "T0 NAV + strong catalyst (A or B) + clean fact check + positive FCF"
      - range: "70-84"
        profile: "T1+ NAV + identifiable catalyst + minor warnings -> BUY"
      - range: "50-69"
        profile: "T2 NAV + weak catalyst or fact check concerns -> HOLD/WATCH"
      - range: "30-49"
        profile: "Marginal NAV qualification + value trap risk -> WATCH"
      - range: "0-29"
        profile: "VETO triggered or no realization mechanism -> AVOID"

  decision:
    buy_threshold: 70
    hold_range: [50, 69]
    watch_range: [30, 49]
    avoid_threshold: 29

# --- Cigar Butt Parameters ---
parameters:
  risk_free_rate: 0.043        # Rf = 4.3% (US 10Y Treasury)
  currency: USD
  amounts_unit: millions

  # T-level NAV entry discounts
  t0_entry_discount: 0.15     # Price < T0_NAV * 0.85
  t1_entry_discount: 0.20     # Price < T1_NAV * 0.80
  t2_entry_discount: 0.30     # Price < T2_NAV * 0.70

  # P/B zones
  pb_deep_value: 0.50
  pb_value: 0.70
  pb_screen_max: 0.60

  # Position sizing by tier
  t0_max_position: 0.10       # 10%
  t1_max_position: 0.08       # 8%
  t2_max_position: 0.05       # 5%

  # Gradient entry tranches
  tranche_1_pct: 0.40         # 40% at buy threshold
  tranche_2_pct: 0.30         # 30% at further 10% decline
  tranche_3_pct: 0.30         # 30% at another 10% decline or catalyst

  # Exit rules
  hard_stop_loss: -0.25       # 25% decline from entry
  max_holding_years: 5

  # Profit-taking by tier
  t0_profit_take_1: 0.95      # T0_NAV * 0.95
  t0_profit_take_2: 1.05      # T0_NAV * 1.05
  t1_profit_take_1: 0.90      # T1_NAV * 0.90
  t1_profit_take_2: 1.00      # T1_NAV * 1.00
  t2_profit_take_1: 0.80      # T2_NAV * 0.80
  t2_profit_take_2: 0.95      # T2_NAV * 0.95

  # Inventory discount coefficients by sector
  inv_discount_consumer: 0.80
  inv_discount_retail: 0.80
  inv_discount_manufacturing: 0.70
  inv_discount_industrial: 0.70
  inv_discount_electronics: 0.50
  inv_discount_technology: 0.50
  inv_discount_pharmaceutical: 0.40
  inv_discount_default: 0.65

  # Asset Burn Rate thresholds by tier
  t0_abr_pass: 0.00
  t0_abr_veto: -0.05
  t1_abr_pass: 0.05
  t1_abr_veto: -0.05
  t2_abr_pass: 0.10
  t2_abr_veto: 0.00

  # Fact check thresholds
  goodwill_veto: 0.30
  goodwill_warn: 0.15
  restricted_cash_veto: 0.20
  off_bs_liab_veto: 0.15
  pension_deficit_veto: 0.10
  revenue_conc_veto: 0.60
  q4_spike_veto: 0.40

  # Type A parameters
  type_a_min_div_yield: 0.05
  type_a_max_pb: 0.50
  type_a_min_div_years: 5
  type_a_max_payout_ratio: 0.80
  type_a_min_fcf_coverage: 0.80

  # Type B parameters
  type_b_min_discount: 0.30
  type_b_min_ownership: 0.10

  # Dividend tax rate
  dividend_tax_rate: 0.15

# --- Backtest ---
backtest:
  start_date: "2020-06-30"
  end_date: "2025-12-31"
  interval: "6m"
  top_n: 50
  concurrency: 3
  forward_windows: [30, 90, 180, 365]
  benchmark: SPY
  universe: sp500
  benchmarks:
    - name: SPY
      type: index
      ticker: SPY
    - name: Screen Pool
      type: equal_weight
      source: screen
    - name: PASS Pool
      type: equal_weight
      source: pass
    - name: BUY Signal
      type: equal_weight
      source: buy
      threshold: 70
    - name: Top 5
      type: top_n
      source: score
      n: 5

# --- LLM ---
llm:
  model: ${LLM_MODEL:-claude-sonnet-4-6}
  max_tokens: 8192
  temperature: 0.1
